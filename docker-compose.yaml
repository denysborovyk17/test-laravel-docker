services:
  php:
    build:
      context: ./dockerfiles
      dockerfile: php.Dockerfile
    container_name: laravel-php
    volumes:
      - ./src:/var/www/laravel
    networks:
      - laravel-net
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:stable-alpine
    container_name: laravel-nginx
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www/laravel
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - laravel-net

  mysql:
    image: mysql:8.0
    container_name: laravel-mysql
    ports:
      - "3316:3306"
    env_file:
      - "env/mysql.env"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - laravel-net

  redis:
    image: redis:alpine
    container_name: laravel-redis
    networks:
      - laravel-net

volumes:
  mysql_data:

networks:
  laravel-net: